<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>{{ page.title }} | Seguridad IT</title>
  <style>
    /* --- ESTILOS GLOBALES (SAFETY PROFESSIONAL THEME) --- */
    body {
      margin: 0;
      font-family: 'Inter', 'Segoe UI', Roboto, sans-serif;
      display: flex;
      background-color: #0f172a; /* Azul pizarra muy oscuro (Professional Dark) */
      color: #e2e8f0; /* Texto gris azulado claro */
    }

    /* --- ANIMACIÓN DEL MENÚ --- */
    @keyframes deslizarDerecha {
      0% { transform: translateX(-100%); opacity: 0; }
      100% { transform: translateX(0); opacity: 1; }
    }

    /* --- ESTILOS DEL MENÚ LATERAL (NAV) --- */
    nav {
      width: 280px;
      background: linear-gradient(180deg, #1e293b 0%, #0f172a 100%);
      padding: 30px 20px;
      height: 100vh;
      position: fixed;
      overflow-y: auto;
      border-right: 1px solid #334155;
      box-shadow: 10px 0 30px rgba(0,0,0,0.5);
      animation: deslizarDerecha 0.8s ease-out forwards;
      box-sizing: border-box;
      display: flex;
      flex-direction: column; 
    }

    nav h3 {
      color: #38bdf8; /* Azul cielo para el título */
      text-align: center;
      margin-top: 0;
      margin-bottom: 25px;
      font-size: 1.1em;
      border-bottom: 2px solid #334155;
      padding-bottom: 15px;
      letter-spacing: 1.5px;
      text-transform: uppercase;
    }

    /* Estilo base de los enlaces del menú */
    nav a {
      display: block;
      margin: 12px 0;
      padding: 12px 15px;
      text-decoration: none;
      font-weight: 600;
      border-radius: 8px;
      background-color: rgba(255, 255, 255, 0.03);
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      font-size: 0.95em;
    }

    /* --- COLORES POR AUTOR (Basados en normativa de seguridad) --- */
    /* Sergio: Azul (Información General) */
    .autor-sergio { color: #38bdf8; border-left: 4px solid #38bdf8; }
    /* Alvaro: Naranja (Advertencia de Riesgos) */
    .autor-alvaro { color: #fb923c; border-left: 4px solid #fb923c; }
    /* Hugo: Verde (Prevención y Salud) */
    .autor-hugo { color: #4ade80; border-left: 4px solid #4ade80; }

    /* Hover effect */
    nav a:hover {
      background-color: #334155;
      transform: translateX(10px); 
      filter: brightness(1.2);
    }
