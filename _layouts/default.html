<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ page.title }} | Seguridad IT</title>
  <style>
    /* --- ESTILOS GLOBALES --- */
    body {
      margin: 0;
      font-family: 'Inter', 'Segoe UI', sans-serif;
      display: flex;
      background-color: #0f172a;
      color: #e2e8f0;
      min-height: 100vh;
    }

    /* --- MENÚ LATERAL --- */
    nav {
      width: 280px;
      background: linear-gradient(180deg, #1e293b 0%, #0f172a 100%);
      padding: 30px 20px;
      height: 100vh;
      position: fixed;
      overflow-y: auto;
      border-right: 1px solid #334155;
      box-shadow: 10px 0 30px rgba(0,0,0,0.5);
      box-sizing: border-box;
      display: flex;
      flex-direction: column;
      z-index: 100;
    }

    nav h3 {
      color: #38bdf8;
      text-align: center;
      margin-bottom: 25px;
      font-size: 1.1em;
      border-bottom: 2px solid #334155;
      padding-bottom: 15px;
      text-transform: uppercase;
    }

    nav a {
      display: block;
      margin: 12px 0;
      padding: 12px 15px;
      text-decoration: none;
      font-weight: 600;
      border-radius: 8px;
      background-color: rgba(255, 255, 255, 0.03);
      transition: all 0.3s ease;
      font-size: 0.95em;
    }

    .autor-sergio { color: #38bdf8; border-left: 4px solid #38bdf8; }
    .autor-alvaro { color: #fb923c; border-left: 4px solid #fb923c; }
    .autor-hugo { color: #4ade80; border-left: 4px solid #4ade80; }

    nav a:hover {
      background-color: #334155;
      transform: translateX(5px);
    }

    /* --- SECCIÓN RESPONSABLES (RESTAURADA) --- */
    .leyenda {
      margin-top: auto;
      padding-top: 20px;
      border-top: 1px solid #334155;
    }

    .leyenda h4 {
      margin-bottom: 15px;
      color: #94a3b8;
      font-size: 0.8em;
      text-transform: uppercase;
    }

    .autor-item {
      display: flex;
      align-items: center;
      margin-bottom: 12px;
      font-size: 0.85em;
      color: #cbd5e1;
    }

    .circulo {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      margin-right: 12px;
    }

    .bg-sergio { background-color: #38bdf8; box-shadow: 0 0 8px rgba(56, 189, 248, 0.4); }
    .bg-alvaro { background-color: #fb923c; box-shadow: 0 0 8px rgba(251, 146, 60, 0.4); }
    .bg-hugo { background-color: #4ade80; box-shadow: 0 0 8px rgba(74, 222, 128, 0.4); }

    /* --- CONTENIDO --- */
    main {
      margin-left: 280px;
      padding: 60px 80px;
      width: calc(100% - 280px);
      box-sizing: border-box;
    }

    table { width: 100%; border-collapse: collapse; margin: 20px 0; background: #1e293b; }
    th, td { border: 1px solid #334155; padding: 12px; }
  </style>
</head>
<body>

  <nav>
    <h3>Seguridad y Salud IT</h3>
    
    <a href="{{ '/index.html' | relative_url }}" class="autor-sergio">🏠 Inicio</a>
    <a href="{{ '/riesgos.html' | relative_url }}" class="autor-alvaro">⚠️ Riesgos Laborales</a>
    <a href="{{ '/prevencion.html' | relative_url }}" class="autor-hugo">🛡️ Prevención de Riesgos</a>

    <div class="leyenda">
      <h4>Responsables</h4>
      <div class="autor-item">
        <div class="circulo bg-sergio"></div>
        <span>Sergio Martin</span>
      </div>
      <div class="autor-item">
        <div class="circulo bg-alvaro"></div>
        <span>Alvaro Garcia</span>
      </div>
      <div class="autor-item">
        <div class="circulo bg-hugo"></div>
        <span>Hugo da silva</span>
      </div>
    </div>
  </nav>

  <main>
    {{ content }}
  </main>

</body>
</html>
